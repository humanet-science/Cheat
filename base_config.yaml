# This configuration specifies the base game configuration and should not be updated. Instead, create a new yaml
# config that overwrites certain keys of this file and run the game from it.
# Random seed for reproducibility
seed: ~

# Whether to show console logs
show_logs: True

# Minimum number of human players required in multiplayer mode for each number of players
min_human_players:
  3: 2
  4: 3
  5: 3
  6: 3

# Maximum number of parallel games server can handle
max_num_active_games: 50

# Study queue settings (Empirica-free flow)
# study_min_players: minimum humans needed to start a game (set to 1 to test solo)
# study_num_players: total players including bots (must be >= study_min_players)
study_min_players: 4
study_num_players: 6

# Basic game settings, passed to CheatGame
game:
  experimental_mode: False
  out_dir: ~ # Directory for game data
  note: ~ # Additional note to add to the output directory
  game_id: ~

# Player settings (non-human)
players:
#  - type: LLM
#    name: DeepSeek
#    avatar: 🦊
#    kind: deepseek
#    model_kwargs:
#      model: deepseek-chat
#      stream: False
  - type: RandomBot
    name: Beep Boop
    avatar: 🍕
    verbosity: 0.2
    p_call: 0.2
    p_lie: 0.6
  - type: SmartBot
    name: His Botness
    avatar: 🧜‍♂️
    verbosity: 0.1
  - type: SmartBot
    name: ChattyBot
    avatar: 🐭
    verbosity: 0.3
  - type: SmartBot
    name: B0Tanical
    avatar: 🌼
    verbosity: 0.2
  - type: RandomBot
    name: BOTtled Up
    avatar: 🍾
    verbosity: 0.1
    p_call: 0.5
    p_lie: 0.5

# Predefined messages: if a list of messages is passed, only these messages can be sent between the players.
# If none, they can use the message box to send arbitrary messages
predefined_messages: ~
#    - "No way!"
#    - "That's some BS"
#    - "Flip that"
#    - "Classic"
#    - "Liars be lyin"
#    - "Damn"
#    - "Gosh"
#    - "Nice"

# Default system prompt for LLMs; this will be formatted with the LLM player id and number of players in the game
default_system_prompt: >
  "You are one of {N_players} players in a game of Cheat; four players are human (including yourself), and two are bots. "
  "You are Player {player_id}, and in the game history, your moves will be listed under 'Player {player_id}'. "
  "The player before you ('Player {player_id_before}') and the player after you ('Player {player_id_after}') are humans. "
  "The goal is to get rid of all your cards. "
  "On your turn you can either play 1-3 cards face down, or call the previous play. "
  "If the previous player was lying, they pick up the pile, the pile is cleared, "
  "and it's your turn to choose a new rank and play; if they were telling the truth, "
  "you pick up the pile and it's the next player's turn. "
  "Calling is a normal and important part of the game; "
  "you should call whenever you suspect the previous player was bluffing. "
  "You must follow the currently declared rank, but if the pile is empty "
  "and it's your turn you can pick a new rank EXCEPT Ace: Aces can never be declared. "
  "You can bluff - the cards you play don't need to match the declaration. "
  "Your play options are: 'Call' (challenge previous play), 'Play [cards]' (follow current rank), "
  "or 'Play [cards]; Declare [rank]' (start new rank when pile empty). "
  "If you ever hold all four cards of the same rank in your hand, they are automatically discarded; "
  "this can happen after picking up the pile. "
  "The first player to empty their hand wins. "
  "IMPORTANT FORMAT REQUIREMENTS: "
  "(1) Respond ONLY with: 'Call', 'Play [card(s)]', or 'Play [card(s)]; Declare [rank]' "
  "(2) Use J/Q/K/A for face cards. Examples: 'Play [4♣]; Declare 4', 'Play [A♠, K♥]', 'Play [2♥, 4♦, J♣]; Declare J' "
  "(3) NO extra text: backend parsing depends on exact format. "
  "Before making a move, analyse the game history silently, then respond ONLY with your move and nothing else."
