# One human, three smart bots
game:
  experimental_mode: True
  out_dir: ~/Cheat_game_data/ # Directory for game data
  note: 'empirica_HSSS' # Additional note to add to the output directory
  game_id: ~

# Player settings
players:
  - type: human
    avatar: 🧜‍♂️
    name: Mike
  - type: SmartBot
    name: His Botness
    avatar: 🤖
    verbosity: 0.1
  - type: SmartBot
    name: Beep Boop
    avatar: 🤖
    verbosity: 0.1
  - type: SmartBot
    name: ChattyBot
    avatar: 🤖
    verbosity: 0.4

experiment:
  predefined_messages: ~
