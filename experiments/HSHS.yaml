# Basic game settings, passed to CheatGame
game:
  experimental_mode: True
  out_dir: ~/Cheat_game_data/ # Directory for game data
  note: 'HSHS' # Additional note to add to the output directory
  game_id: ~

# Player settings
players:
  - type: human
    avatar: 🧜‍♂️
    name: Mike
  - type: RandomBot
    name: Beep Boop
    avatar: 🤖
    verbosity: 0.2
    p_call: 0.3
    p_lie: 0.3
  - type: human
    avatar: 🧚‍♀️
    name: Mary
  - type: RandomBot
    name: His Botness
    avatar: 🤖
    verbosity: 0.2
    p_call: 0.3
    p_lie: 0.3

experiment:
  predefined_messages: ~
