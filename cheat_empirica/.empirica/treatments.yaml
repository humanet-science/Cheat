factors:
    - name: numRounds
      desc: Number of rounds to play
      values:
        - value: 1
        - value: 2
        - value: 3
        - value: 4
        - value: 5
    - name: gameConfiguration
      desc: Player configuration types; must correspond to filenames located in 'experiments'
      values:
        - value: HSSS
        - value: HRRR
        - value: HSHS
        - value: HRHR
        - value: HSHHs
        - value: Test
        - value: 4H2L
        - value: 4H2S
        - value: 4H2S_control
    - name: playerCount
      desc: determines the number of human players in a game
      values:
        - value: 3
        - value: 4
        - value: 5
        - value: 6
        - value: 2
        - value: 1
treatments:
    - name: Solo
      desc: One human vs three random bots
      factors:
        gameConfiguration: HRRR
        numRounds: 1
        playerCount: 1
    - name: SixPlayer
      desc: Four humans, two smart bots
      factors:
        gameConfiguration: 4H2S
        numRounds: 4
        playerCount: 4
    - name: SixPlayer_control
      desc: Six humans, two displayed as bots
      factors:
        gameConfiguration: 4H2S_control
        numRounds: 4
        playerCount: 6
    - name: SixPlayer_LLM
      desc: Four humans, two LLMs
      factors:
        gameConfiguration: 4H2L
        numRounds: 4
        playerCount: 4
    - name: Two Players
      desc: Two humans vs two smart bots, placed alternately
      factors:
        gameConfiguration: HBHB
        numRounds: 2
        playerCount: 2
    - name: Test
      desc: Test
      factors:
        gameConfiguration: Test
        numRounds: 1
        playerCount: 1
