factors:
    - name: playerCount
      desc: determines the number of human players in a game
      values:
        - value: 3
        - value: 4
        - value: 5
        - value: 6
    - name: numRounds
      desc: Number of rounds to play
      values:
        - value: 1
        - value: 2
        - value: 3
        - value: 4
        - value: 5
    - name: gameConfiguration
      desc: Player configuration types; must correspond to filenames located in 'experiments'
      values:
        - value: HRRR
        - value: HSHS
        - value: Test
        - value: HHHBHB
treatments:
    - name: Solo
      desc: One human vs three random bots
      factors:
        gameConfiguration: HRRR
        numRounds: 1
        playerCount: 1
    - name: Two Players
      desc: Two humans vs two smart bots, placed alternately
      factors:
        gameConfiguration: HSHS
        numRounds: 1
        playerCount: 2
    - name: Test
      desc: Test
      factors:
        gameConfiguration: Test
        numRounds: 2
        playerCount: 1
    - name: SixPlayer
      desc: Four humans, two bots
      factors:
        gameConfiguration: HHHBHB
        numRounds: 2
        playerCount: 4
